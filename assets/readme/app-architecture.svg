<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720"><stop stop-color="#050816"/><stop offset="1" stop-color="#1E1B4B"/></linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFFFFF" stop-opacity="0.17"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#38BDF8"/><stop offset="0.55" stop-color="#8B5CF6"/><stop offset="1" stop-color="#F472B6"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#93C5FD"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.38"/></filter>
  </defs>
  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <text x="640" y="78" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="42" font-weight="900">Zenith Walls Architecture</text>
  <text x="640" y="116" text-anchor="middle" fill="#C7D2FE" font-family="Arial, sans-serif" font-size="19">Wallpaper discovery powered by Pixabay, local persistence, responsive UI, and native device APIs</text>

  <g filter="url(#shadow)">
    <rect x="75" y="190" width="230" height="130" rx="28" fill="url(#node)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="190" y="238" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="900" font-family="Arial, sans-serif">Expo App</text>
    <text x="190" y="272" text-anchor="middle" fill="#C7D2FE" font-size="15" font-family="Arial, sans-serif">Gesture root, providers</text>
    <text x="190" y="296" text-anchor="middle" fill="#93C5FD" font-size="14" font-family="Arial, sans-serif">OTA update checks</text>

    <rect x="365" y="190" width="230" height="130" rx="28" fill="url(#node)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="480" y="238" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="900" font-family="Arial, sans-serif">Navigation</text>
    <text x="480" y="272" text-anchor="middle" fill="#C7D2FE" font-size="15" font-family="Arial, sans-serif">Stack plus tabs</text>
    <text x="480" y="296" text-anchor="middle" fill="#93C5FD" font-size="14" font-family="Arial, sans-serif">Blur bottom bar</text>

    <rect x="655" y="190" width="230" height="130" rx="28" fill="url(#accent)"/>
    <text x="770" y="238" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="900" font-family="Arial, sans-serif">Discovery UI</text>
    <text x="770" y="272" text-anchor="middle" fill="#EEF2FF" font-size="15" font-family="Arial, sans-serif">Search, filters, grid</text>
    <text x="770" y="296" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="Arial, sans-serif">Infinite scroll</text>

    <rect x="945" y="190" width="230" height="130" rx="28" fill="url(#node)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="1060" y="238" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="900" font-family="Arial, sans-serif">Pixabay API</text>
    <text x="1060" y="272" text-anchor="middle" fill="#C7D2FE" font-size="15" font-family="Arial, sans-serif">Axios requests</text>
    <text x="1060" y="296" text-anchor="middle" fill="#93C5FD" font-size="14" font-family="Arial, sans-serif">Images and metadata</text>
  </g>

  <path d="M305 255H365" stroke="#93C5FD" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M595 255H655" stroke="#93C5FD" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M885 255H945" stroke="#93C5FD" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="205" y="455" width="230" height="130" rx="28" fill="url(#node)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="320" y="503" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="900" font-family="Arial, sans-serif">Favorites</text>
    <text x="320" y="536" text-anchor="middle" fill="#C7D2FE" font-size="15" font-family="Arial, sans-serif">AsyncStorage</text>
    <text x="320" y="560" text-anchor="middle" fill="#93C5FD" font-size="14" font-family="Arial, sans-serif">Saved wallpapers</text>

    <rect x="525" y="455" width="230" height="130" rx="28" fill="url(#node)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="640" y="503" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="900" font-family="Arial, sans-serif">Downloads</text>
    <text x="640" y="536" text-anchor="middle" fill="#C7D2FE" font-size="15" font-family="Arial, sans-serif">Media library</text>
    <text x="640" y="560" text-anchor="middle" fill="#93C5FD" font-size="14" font-family="Arial, sans-serif">Gallery save history</text>

    <rect x="845" y="455" width="230" height="130" rx="28" fill="url(#node)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="960" y="503" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="900" font-family="Arial, sans-serif">Responsive</text>
    <text x="960" y="536" text-anchor="middle" fill="#C7D2FE" font-size="15" font-family="Arial, sans-serif">Mobile, tablet, web</text>
    <text x="960" y="560" text-anchor="middle" fill="#93C5FD" font-size="14" font-family="Arial, sans-serif">Adaptive masonry grid</text>
  </g>

  <path d="M770 320C760 390 360 390 320 455" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M770 320C760 385 660 395 640 455" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M770 320C790 390 930 390 960 455" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
