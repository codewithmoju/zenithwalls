<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720"><stop stop-color="#050716"/><stop offset="0.5" stop-color="#11113A"/><stop offset="1" stop-color="#2E1065"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#38BDF8"/><stop offset="0.55" stop-color="#8B5CF6"/><stop offset="1" stop-color="#F472B6"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFFFFF" stop-opacity="0.18"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0.055"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38BDF8"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="1100" cy="110" r="210" fill="#8B5CF6" opacity="0.18"/>
  <circle cx="170" cy="610" r="210" fill="#38BDF8" opacity="0.10"/>
  <text x="640" y="76" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="42" font-weight="900">Wallpaper Discovery Pipeline</text>
  <text x="640" y="114" text-anchor="middle" fill="#C9D8FF" font-family="Arial, sans-serif" font-size="19">Search, filters, pagination, duplicate protection, and optimized image rendering</text>

  <g filter="url(#shadow)">
    <g transform="translate(70 248)">
      <rect width="180" height="150" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="90" y="58" text-anchor="middle" fill="#FFFFFF" font-size="23" font-weight="900" font-family="Arial, sans-serif">User Input</text>
      <text x="90" y="92" text-anchor="middle" fill="#AFC7FF" font-size="15" font-family="Arial, sans-serif">Search</text>
      <text x="90" y="118" text-anchor="middle" fill="#AFC7FF" font-size="15" font-family="Arial, sans-serif">Category</text>
    </g>
    <g transform="translate(300 248)">
      <rect width="180" height="150" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="90" y="58" text-anchor="middle" fill="#FFFFFF" font-size="23" font-weight="900" font-family="Arial, sans-serif">Debounce</text>
      <text x="90" y="92" text-anchor="middle" fill="#AFC7FF" font-size="15" font-family="Arial, sans-serif">400ms delay</text>
      <text x="90" y="118" text-anchor="middle" fill="#AFC7FF" font-size="15" font-family="Arial, sans-serif">Reset state</text>
    </g>
    <g transform="translate(550 228)">
      <rect width="180" height="190" rx="32" fill="url(#accent)"/>
      <text x="90" y="62" text-anchor="middle" fill="#FFFFFF" font-size="25" font-weight="900" font-family="Arial, sans-serif">Pixabay</text>
      <text x="90" y="94" text-anchor="middle" fill="#FFFFFF" font-size="25" font-weight="900" font-family="Arial, sans-serif">API</text>
      <text x="90" y="136" text-anchor="middle" fill="#F4ECFF" font-size="15" font-family="Arial, sans-serif">Axios GET</text>
    </g>
    <g transform="translate(800 248)">
      <rect width="180" height="150" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="90" y="58" text-anchor="middle" fill="#FFFFFF" font-size="23" font-weight="900" font-family="Arial, sans-serif">Processing</text>
      <text x="90" y="92" text-anchor="middle" fill="#AFC7FF" font-size="15" font-family="Arial, sans-serif">Deduplicate</text>
      <text x="90" y="118" text-anchor="middle" fill="#AFC7FF" font-size="15" font-family="Arial, sans-serif">Optimize URLs</text>
    </g>
    <g transform="translate(1030 248)">
      <rect width="180" height="150" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="90" y="58" text-anchor="middle" fill="#FFFFFF" font-size="23" font-weight="900" font-family="Arial, sans-serif">Image Grid</text>
      <text x="90" y="92" text-anchor="middle" fill="#AFC7FF" font-size="15" font-family="Arial, sans-serif">Masonry UI</text>
      <text x="90" y="118" text-anchor="middle" fill="#AFC7FF" font-size="15" font-family="Arial, sans-serif">Infinite scroll</text>
    </g>
  </g>

  <path d="M250 323H300" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M480 323H550" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M730 323H800" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M980 323H1030" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(185 520)">
    <rect width="910" height="84" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="60" y="52" fill="#38BDF8" font-size="18" font-weight="900" font-family="Arial, sans-serif">01</text>
    <text x="105" y="52" fill="#FFFFFF" font-size="18" font-weight="700" font-family="Arial, sans-serif">Safe search</text>
    <text x="270" y="52" fill="#38BDF8" font-size="18" font-weight="900" font-family="Arial, sans-serif">02</text>
    <text x="315" y="52" fill="#FFFFFF" font-size="18" font-weight="700" font-family="Arial, sans-serif">Minimum dimensions</text>
    <text x="535" y="52" fill="#38BDF8" font-size="18" font-weight="900" font-family="Arial, sans-serif">03</text>
    <text x="580" y="52" fill="#FFFFFF" font-size="18" font-weight="700" font-family="Arial, sans-serif">Page limit guard</text>
    <text x="760" y="52" fill="#38BDF8" font-size="18" font-weight="900" font-family="Arial, sans-serif">04</text>
    <text x="805" y="52" fill="#FFFFFF" font-size="18" font-weight="700" font-family="Arial, sans-serif">Unique image IDs</text>
  </g>
</svg>
