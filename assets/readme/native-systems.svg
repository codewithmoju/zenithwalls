<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720"><stop stop-color="#070817"/><stop offset="1" stop-color="#1E1B4B"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#22D3EE"/><stop offset="0.55" stop-color="#8B5CF6"/><stop offset="1" stop-color="#EC4899"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFFFFF" stop-opacity="0.17"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0.055"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#22D3EE"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000" flood-opacity="0.48"/></filter>
  </defs>
  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="170" cy="125" r="190" fill="#22D3EE" opacity="0.09"/>
  <circle cx="1080" cy="610" r="230" fill="#EC4899" opacity="0.12"/>
  <text x="640" y="76" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="42" font-weight="900">Native Storage and Device Systems</text>
  <text x="640" y="114" text-anchor="middle" fill="#C9D8FF" font-family="Arial, sans-serif" font-size="19">Favorites, download history, gallery permissions, file caching, and device integrations</text>

  <g filter="url(#shadow)">
    <rect x="90" y="205" width="270" height="140" rx="30" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="225" y="260" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="900">Favorites Context</text>
    <text x="225" y="296" text-anchor="middle" fill="#AFC7FF" font-family="Arial, sans-serif" font-size="16">favorites key</text>
    <text x="225" y="320" text-anchor="middle" fill="#AFC7FF" font-family="Arial, sans-serif" font-size="16">Add remove check</text>

    <rect x="505" y="180" width="270" height="190" rx="34" fill="url(#accent)"/>
    <text x="640" y="255" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="900">AsyncStorage</text>
    <text x="640" y="295" text-anchor="middle" fill="#F4ECFF" font-family="Arial, sans-serif" font-size="17">Local persistence layer</text>
    <text x="640" y="325" text-anchor="middle" fill="#F4ECFF" font-family="Arial, sans-serif" font-size="17">Offline-friendly metadata</text>

    <rect x="920" y="205" width="270" height="140" rx="30" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="1055" y="260" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="900">Downloads Context</text>
    <text x="1055" y="296" text-anchor="middle" fill="#AFC7FF" font-family="Arial, sans-serif" font-size="16">zenith_downloads key</text>
    <text x="1055" y="320" text-anchor="middle" fill="#AFC7FF" font-family="Arial, sans-serif" font-size="16">Stats history metadata</text>

    <rect x="250" y="455" width="270" height="140" rx="30" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="385" y="510" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="900">FileSystem</text>
    <text x="385" y="546" text-anchor="middle" fill="#AFC7FF" font-family="Arial, sans-serif" font-size="16">Cache image file</text>
    <text x="385" y="570" text-anchor="middle" fill="#AFC7FF" font-family="Arial, sans-serif" font-size="16">Prepare download</text>

    <rect x="760" y="455" width="270" height="140" rx="30" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="895" y="510" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="900">Media Library</text>
    <text x="895" y="546" text-anchor="middle" fill="#AFC7FF" font-family="Arial, sans-serif" font-size="16">Ask permission</text>
    <text x="895" y="570" text-anchor="middle" fill="#AFC7FF" font-family="Arial, sans-serif" font-size="16">Save to gallery</text>
  </g>

  <path d="M360 275H505" stroke="#22D3EE" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M775 275H920" stroke="#22D3EE" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M585 370C540 420 465 425 420 455" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M695 370C745 420 825 425 870 455" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
